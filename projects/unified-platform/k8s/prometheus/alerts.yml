# Phase 2: Prometheus アラートルール
groups:
  - name: unified-platform
    rules:
      - alert: AppDown
        expr: sum(up{job="unified-platform"}) == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "UEP Standalone アプリがダウンしています"
      - alert: HighErrorRate
        expr: |
          sum(rate(unified_http_requests_total{status_code=~"5.."}[5m]))
          / sum(rate(unified_http_requests_total[5m])) > 0.05
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "エラー率が高いです"
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(unified_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "レスポンスが遅延しています"
