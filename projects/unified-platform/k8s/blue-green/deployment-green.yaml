# Phase 4: Blue-Green - Green deployment (standby)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-platform-green
  labels:
    app: unified-platform
    version: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: unified-platform
      version: green
  template:
    metadata:
      labels:
        app: unified-platform
        version: green
    spec:
      containers:
      - name: app
        image: unified-platform:latest
        ports:
        - containerPort: 8000
        env:
        - name: DEPLOYMENT_VERSION
          value: "green"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: unified-platform-green
spec:
  selector:
    app: unified-platform
    version: green
  ports:
  - port: 80
    targetPort: 8000
