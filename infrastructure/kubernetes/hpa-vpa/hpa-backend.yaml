# HPA - Backend API
# 補強スキル: Kubernetes HPA/VPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uep-backend-hpa
  namespace: uep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uep-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
