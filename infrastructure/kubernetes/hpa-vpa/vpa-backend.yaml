# VPA - Backend API（推奨リソース）
# 補強スキル: Kubernetes VPA
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: uep-backend-vpa
  namespace: uep
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uep-backend
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: backend
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: "2"
          memory: 2Gi
