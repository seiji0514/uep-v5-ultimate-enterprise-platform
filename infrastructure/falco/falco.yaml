# Falco 設定（UEP v5.0）
# Webhook でバックエンドへアラート送信

# カスタムルール読み込み
rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules_uep.yaml

# Webhook 出力（バックエンドの Falco アラート受信エンドポイントへ）
json_output: true
json_include_output_property: true

# プログラム出力（Webhook 用）
program_output:
  enabled: true
  keep_alive: false
  program: "curl -s -X POST -H 'Content-Type: application/json' -d @- http://backend:8000/api/v1/security-defense-platform/falco/alerts"
