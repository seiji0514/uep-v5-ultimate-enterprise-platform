# Prometheus設定ファイル
# 医療データ異常検知MLOps監視用

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'medical-mlops'
    environment: 'production'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'medical-mlops-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8001']
    scrape_interval: 10s

