# 医療データ異常検知MLOps - Docker Compose
# 企業レベル本番環境対応

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-mlops-api
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8001
    volumes:
      - ./logs:/app/logs
      - ./medical_data_sample.csv:/app/medical_data_sample.csv
    restart: unless-stopped
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Prometheus（監視）
  prometheus:
    image: prom/prometheus:latest
    container_name: medical-mlops-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - medical-network
    restart: unless-stopped

  # Grafana（可視化）
  grafana:
    image: grafana/grafana:latest
    container_name: medical-mlops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - medical-network
    restart: unless-stopped

networks:
  medical-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

